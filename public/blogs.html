        @theme {

            body {

    <!--HandlebarJS-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.8/handlebars.min.js"></script>
    <script src="js/helpers/handlebars-formatDate-helpers.js"></script>
    
    <script id="blogs-template" type="text/x-handlebars-template">
        {{#each data.data}}
        <div class="py-4 clear-both">
            <h2 class="font-heading text-3xl"><a href="blog-details.html?id={{id}}">{{title}}</a></h2>
            <p class="py-4">
                by {{#if author}}{{author.name}}{{else}}Anonymous{{/if}} in
                <a href="blogs.html?category={{category_id}}">{{category.name}}</a> on {{formatDate created_at}}
                <a href="href="blog-details.html?id={{id}}#comments">
                    Comments ({{comments.length}})</a>
            </p>
            <a href="blog-details.html?id={{id}}"><img src="{{thumbpath}}" alt="{{title}}" class="float-start mb-8 me-8 rounded-xl"></a>
            <p class="text-justify">{{summary}}</p>
            <a href="blog-details.html?id={{id}}" class="read-more">Read more... </a>
        </div>
        {{/each}}
        
        {{#with data.pagination}}
        <nav aria-label="Page navigation example" class="clear-both mt-8 flex justify-center">
            <ul class="flex -space-x-px text-sm">
                {{#pagination currentPage pageCount size}}

                {{#unless startFromFirstPage}}
                <li>
                    <a href="blogs.html?page={{prevPage}}&category={{category}}" class="flex items-center justify-center text-body bg-neutral-secondary-medium box-border border border-default-medium hover:bg-neutral-tertiary-medium hover:text-heading font-medium rounded-s-base text-sm w-9 h-9 focus:outline-none">
                        <span class="sr-only">Previous</span>
                        <svg class="w-4 h-4 rtl:rotate-180" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m15 19-7-7 7-7"/></svg>
                    </a>
                </li>
                {{/unless}}

                {{#each pages}}
                <li>
                    <a href="blogs.html?page={{page}}&category={{../category}}" class="flex items-center justify-center text-body bg-neutral-secondary-medium box-border border border-default-medium hover:bg-neutral-tertiary-medium hover:text-heading font-medium text-sm w-9 h-9 focus:outline-none {{#if isCurrent}}active{{/if}}">{{page}}</a>
                </li>
                {{/each}}

                {{#unless endAtLastPage}}
                <li>
                    <a href="blogs.html?page={{nextPage}}&category={{category}}" class="flex items-center justify-center text-body bg-neutral-secondary-medium box-border border border-default-medium hover:bg-neutral-tertiary-medium hover:text-heading font-medium rounded-e-base text-sm w-9 h-9 focus:outline-none">
                        <span class="sr-only">Next</span>
                        <svg class="w-4 h-4 rtl:rotate-180" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m9 5 7 7-7 7"/></svg>
                    </a>
                </li>
                {{/unless}}

                {{/pagination}}
            </ul>
        </nav>
        {{/with}}
    </script>  

    <script id="categories-template" type="text/x-handlebars-template">
        <li class="flex items-center" id="categoryAll">
            <img src="images/marker1.png" alt="" class="me-2">
            <a href="blogs.html">Show All</a>
        </li>
        {{#each data}}
        <li class="flex items-center" id="category{{id}}">
            <img src="images/marker1.png" alt="" class="me-2">
            <a href="blogs.html?category={{id}}">{{name}}</a>
        </li>
        {{/each}}
    </script>
    


    
    <!--Link Supabase-->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/24880269.js"></script>
    <script src="js/api/database.js"></script>
    <script src="https://flowbite.com/docs/flowbite.min.js"></script>

    <script>
        (async function () {
            const selectedCategory = getSelectedCategoryFromURL();
            const selectedPage = new URLSearchParams(window.location.search).get("page") || 1;

            const [categories, blogsResult] = await Promise.all([
                fetchCategoriesByType("blogs"),
                fetchBlogsByCategoryId(selectedCategory, selectedPage, 2),
            ]);

            renderView("categories-template", "categories", categories);
            renderView("blogs-template", "blogs", blogsResult);

            highlightCategoryTab(selectedCategory || "All");
        })();
    </script>
