<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&display=swap" rel="stylesheet">

    <!--TailwindCSS & Flowbite-->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://flowbite.com/docs/main.css?v=4.0.1" id="theme">
    <title>Web1 Project - Login</title>

    <style type="text/tailwindcss">
        @theme {
            --font-heading: 'Changa One', cursive;
            --font-body: "Trebuchet MS", Arial, Helvetica, sans-serif;
        }
        @layer base {
            body {
               @apply font-body;
            }
            h1, h2, h3, h4, h5, h6, nav a {
                @apply font-heading;
            }
        }

        @layer components {
            .active {
                @apply !text-cyan-600;
            }
            footer .active{
                @apply !text-pink-300;
            }
            .read-more{
                @apply text-cyan-600 underline hover:text-cyan-800;
            }
            
            
        }
    </style>
</head>
<body>
    <section class="bg-gray-50 dark:bg-gray-900">
        <div class="flex flex-col items-center justify-center px-6 py-8 mx-auto md:h-screen lg:py-0">
            <a href="index.html" class="flex items-center mb-6 text-2xl font-semibold text-gray-900 dark:text-white">
                <img class="h-18 mr-2" src="images/logo.png" alt="logo">
                
            </a>
            <div class="w-full bg-white rounded-lg shadow dark:border md:mt-0 sm:max-w-md xl:p-0 dark:bg-gray-800 dark:border-gray-700">
                <div class="p-6 space-y-4 md:space-y-6 sm:p-8">
                    <h1 class="text-xl font-bold leading-tight tracking-tight text-gray-900 md:text-2xl dark:text-white">
                        Sign in to your account
                    </h1>
                    <form class="space-y-4 md:space-y-6" action="#" onsubmit="login(event)">
                        <div>
                            <label for="email" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Your email</label>
                            <input type="email" name="email" id="email" class="bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="name@company.com" required=""
                            pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$">
                        </div>
                        <div>
                            <label for="password" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Password</label>
                            <input type="password" name="password" id="password" placeholder="••••••••" class="bg-gray-50 border border-gray-300 text-gray-900 rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" required="">
                        </div>
        
                        <button type="submit" class="w-full text-white bg-cyan-600 focus:ring-4 focus:outline-none focus:ring-primary-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-primary-600 dark:hover:bg-primary-700 dark:focus:ring-primary-800">Sign in</button>
                        <p class="text-sm font-light text-gray-500 dark:text-gray-400">
                            Don’t have an account yet? <a href="register.html" class="font-medium text-primary-600 hover:underline dark:text-primary-500">Sign up</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </section>
            
    
    <script src="https://flowbite.com/docs/flowbite.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script
    <script src="https://cdn.jsdelivr.net/npm/handlebars@4.7.8/dist/handlebars.min.js"></script> 
    
    <script src="js/24880269.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/api/database.js"></script>
    <script>
        async function login(e) {
            e.preventDefault();

            const returnUrl = document.referrer ? document.referrer : "blogs.html";

            const email = document.querySelector('#email').value;
            const password = document.querySelector('#password').value;

            if (!email || !password) {
                showToast('warning', 'Login Error: Email and password can not be empty!');
            }

            const loginBtn = document.querySelector('button[type=submit]');

            try {
                loginBtn.innerText = 'Signing in...';
                await supabaseLogin(email, password);
                window.location.replace(returnUrl);
            } catch (error) {
                loginBtn.innerText = "Sign in";
                showToast("warning", `Login Error: ${error.message}`);
            }
        }
    </script>
</body>
