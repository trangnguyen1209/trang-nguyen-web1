     <!--Link Supabase-->

    <script src="js/24880269.js"></script>
    <script src="js/api/database.js"></script>
    <script>
        (async function() {
            const [categories, gallery] = await Promise.all([
                fetchCategoriesByType(),
                fetchGallery(),
            ]);
            const selectedCategory = getSelectedCategoryFromURL();
            const { selectedGallery, activeCategoryId } =
                selectGalleryByCategory(gallery, selectedCategory);

            renderView("categories-template", "categories", categories);
            renderView("gallery-template", "gallery", selectedGallery);

            highlightCategoryTab(activeCategoryId);
        })();
        function getSelectedCategoryFromURL() {
            const queryString = window.location.search;
            const searchParams = new URLSearchParams(queryString);
            return searchParams.get("category");
        }
        function selectGalleryByCategory(gallery, categoryId) {

            if (!categoryId) {
                return { selectedGallery: gallery, activeCategoryId: "All" };
            }
            const filtered = gallery.filter(i => i.category_id == categoryId);

            if (filtered.length === 0) {
                return { selectedGallery: gallery, activeCategoryId: "All" };
            }

            return { selectedGallery: filtered, activeCategoryId: categoryId };
        }


        function highlightCategoryTab(categoryId) {
            const categoriesRoot = document.querySelector('#categories');

            if (!categoriesRoot) return;

            categoriesRoot.querySelector(".active")?.classList.remove('active');
            categoriesRoot.querySelector(`#category${categoryId} a`)?.classList.add('active');
        }

    </script>
