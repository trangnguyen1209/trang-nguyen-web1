     <!--HandlebarJS-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.8/handlebars.min.js"></script>
    <script src="js/helpers/handlebars-formatDate-helpers.js"></script>

    <!--Template-->
    <script id="blog-template" type="text/x-handlebars-template">
        {{#with data}}
                    
        <div class="py-4">
                <h2 class="font-heading text-3xl"><a href="#">{{title}}</a></h2>
                <p class="py-4">by {{#if author}}{{author.name}}{{else}}Anonymous{{/if}} in<a href="blogs.html?category={{category_id}}">{{category.name}}</a> on {{formatDate created_at}} <a href="#comment">Comments ({{comments.length}})</a></p>
                <a href="#"><img src="{{imagepath}}" alt="Blog Title" class="block w-full mb-8 me-8 rounded-xl"></a>
                <div class="text-justify">
                    {{{description}}}
                </div>

        </div>
            
      
        
        <!--Comment form-->
        <form>
            <h2 class="font-heading text-3xl pb-8">Leave a comment</h2>

            <div class="mb-6">
                <label for="message" class="block mb-2.5 text-sm font-medium text-heading">
                    Your message
                </label>

                <textarea
                    id="message"
                    rows="4"
                    class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full p-3.5 shadow-xs placeholder:text-body"
                    placeholder="Write your thoughts here..."
                ></textarea>
            </div>

            <div class="float-start flex items-start mb-6">
                <div class="flex items-center h-5">
                    <input
                        id="remember"
                        type="checkbox"
                        value=""
                        class="w-4 h-4 border border-default-medium rounded-xs bg-neutral-secondary-medium focus:ring-2 focus:ring-brand-soft"
                        required
                    />
                </div>

                <label for="remember" class="ms-2 text-sm font-medium text-heading">
                    I agree with the
                    <a href="#" class="text-fg-brand hover:underline">
                        terms and conditions
                    </a>.
                </label>
            </div>

            <button
                type="submit"
                class="float-end text-white bg-cyan-600 box-border border border-transparent hover:bg-brand-strong focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none mb-4"
            >
                Submit
            </button>

            <div class="clear-both" id="comments">

                <div class="bg-heading text-white py-2 px-4 rounded-xl">
                    Comments ({{comments.length}})
                </div>

                {{#each comments}}
                <div class="py-4 border-b border-gray-200">

                    <p>
                        <span class="me-8 font-semibold">
                            {{#if author}}
                                {{author.name}}
                            {{else}}
                                Anonymous
                            {{/if}}
                        </span>

                        <span class="float-end">
                            {{formatDate created_at}}
                        </span>
                    </p>

                    <p class="text-justify py-4 clear-end">
                        {{message}}
                    </p>

                </div>
                {{/each}}

            </div>
        </form>
    
        {{/with}}

    </script>

    
    <script id="categories-template" type="text/x-handlebars-template">
        <li class="flex items-center" id="categoryAll">
            <img src="images/marker1.png" alt="" class="me-2">
            <a href="blogs.html">Show All</a>
        </li>
        {{#each data}}
        <li class="flex items-center" id="category{{id}}">
            <img src="images/marker1.png" alt="" class="me-2">
            <a href="blogs.html?category={{id}}">{{name}}</a>
        </li>
        {{/each}}
    </script>



    <!--Link Supabase-->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/24880269.js"></script>
    <script src="js/api/database.js"></script>

    <script>
       (async function () {
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");

            if (!id) {
                document.querySelector("#blog").innerHTML = "<p>Blog not found.</p>";
                return;
            }

            const blog = await fetchBlogById(id);
            renderView("blog-template", "blog", blog);
        })();
    </script>
